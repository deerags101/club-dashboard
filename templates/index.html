<!DOCTYPE html>
<html>
<head>
    <title>WebCrafters</title>

    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            font-size: 45px;
            margin-top: 20px;
        }

        .card {
            background: #0f172a;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            width: 60%;
            box-shadow: 0 0 20px rgba(56,189,248,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .top1 { border: 3px solid gold; box-shadow: 0 0 20px gold; }
        .top2 { border: 3px solid silver; }
        .top3 { border: 3px solid orange; }

        input, select {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            width: 150px;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        .forms {
            margin-top: 30px;
        }

        .score {
            font-size: 22px;
            color: #22c55e;
        }

        .leader {
            color: #facc15;
        }

    </style>
</head>

<body>

<h1>🏆 WebCrafters</h1>

<canvas id="chart" width="400" height="150"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = [{% for t in teams %}"{{ t.name }}",{% endfor %}];
    const data = [{% for t in teams %}{{ t.score }},{% endfor %}];

    new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Scores',
                data: data
            }]
        }
    });
</script>

<div class="forms">

<!-- ADD TEAM -->
<form action="/add_team" method="POST">
    <input name="name" placeholder="Team Name" required>
    <input name="leader" placeholder="Leader Name" required>
    <button>Add Team</button>
</form>

<!-- ADD MEMBER -->
<form action="/add_member" method="POST">
    <input name="name" placeholder="Member Name" required>

    <select name="team_id">
        {% for t in all_teams %}
        <option value="{{ t[0] }}">{{ t[1] }}</option>
        {% endfor %}
    </select>

    <button>Add Member</button>
</form>

<!-- ADD SCORE -->
<form action="/add_score" method="POST">
    <input name="score" placeholder="Score" required>

    <select name="team_id">
        {% for t in all_teams %}
        <option value="{{ t[0] }}">{{ t[1] }}</option>
        {% endfor %}
    </select>

    <button>Add Score</button>
</form>

</div>

<hr>

<!-- LEADERBOARD -->
{% for team in teams %}
<div class="card 
    {% if loop.index == 1 %}top1{% endif %}
    {% if loop.index == 2 %}top2{% endif %}
    {% if loop.index == 3 %}top3{% endif %}">
    
    <h2>#{{ loop.index }} {{ team.name }}</h2>
    <p class="leader">👑 Leader: {{ team.leader }}</p>
    <p>👥 Members: {{ team.members | join(', ') }}</p>
    <p class="score">🔥 Score: {{ team.score }}</p>

</div>
{% endfor %}

</body>
</html>
