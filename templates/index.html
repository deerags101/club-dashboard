<!DOCTYPE html>
<html>
<head>
    <title>Club Dashboard</title>

    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: #38bdf8;
            font-size: 40px;
        }

        .card {
            background: #0f172a;
            margin: 15px auto;
            padding: 15px;
            border-radius: 10px;
            width: 60%;
            font-size: 20px;
            box-shadow: 0 0 10px #38bdf8;
        }

        .top1 { border: 3px solid gold; box-shadow: 0 0 20px gold; }
        .top2 { border: 2px solid silver; }
        .top3 { border: 2px solid orange; }

        input, select, button {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }

        .form-section {
            margin: 10px;
        }
    </style>

    <!-- AUTO REFRESH -->
    <script>
        setInterval(() => {
            location.reload();
        }, 3000);
    </script>

</head>

<body>

<h1>🏆 Club Leaderboard</h1>

<!-- 📊 GRAPH -->
<canvas id="chart" width="500" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = [{% for t in teams %}"{{ t.name }}",{% endfor %}];
    const data = [{% for t in teams %}{{ t.score }},{% endfor %}];

    new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Scores',
                data: data
            }]
        }
    });
</script>

<hr>

<!-- ADD TEAM -->
<div class="form-section">
<form action="/add_team" method="POST">
    <input name="name" placeholder="Team Name" required>
    <input name="leader" placeholder="Leader Name" required>
    <button>Add Team</button>
</form>
</div>

<!-- ADD MEMBER -->
<div class="form-section">
<form action="/add_member" method="POST">
    <input name="name" placeholder="Member Name" required>

    <select name="team_id">
        {% for t in all_teams %}
        <option value="{{ t[0] }}">{{ t[1] }}</option>
        {% endfor %}
    </select>

    <button>Add Member</button>
</form>
</div>

<!-- ADD SCORE -->
<div class="form-section">
<form action="/add_score" method="POST">
    <input name="score" placeholder="Score" required>

    <select name="team_id">
        {% for t in all_teams %}
        <option value="{{ t[0] }}">{{ t[1] }}</option>
        {% endfor %}
    </select>

    <button>Add Score</button>
</form>
</div>

<hr>

<!-- LEADERBOARD -->
{% for team in teams %}
<div class="card 
    {% if loop.index == 1 %}top1{% endif %}
    {% if loop.index == 2 %}top2{% endif %}
    {% if loop.index == 3 %}top3{% endif %}">
    
    <h2>#{{ loop.index }} {{ team.name }}</h2>
    <p>👑 Leader: {{ team.leader }}</p>
    <p>👥 Members: {{ team.members | join(', ') }}</p>
    <p>🔥 Score: {{ team.score }}</p>
</div>
{% endfor %}

</body>
</html>
