<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #020617;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>🔐 Admin Login</h2>

<form method="POST">
    <input name="username" placeholder="Username" required><br>
    <input name="password" type="password" placeholder="Password" required><br>
    <button>Login</button>
</form>

</body>
</html>
