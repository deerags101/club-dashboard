<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body style="font-family:Arial;text-align:center;">
  <h1>⚙️ Admin Panel</h1>
  <a href="/logout">Logout</a>

  <h3>Add Team</h3>
  <form action="/add_team" method="POST">
    <input name="name" placeholder="Team Name" required>
    <input name="leader" placeholder="Leader" required>
    <button>Add</button>
  </form>

  <h3>Add Member</h3>
  <form action="/add_member" method="POST">
    <input name="name" placeholder="Member Name" required>
    <select name="team_id">
      {% for t in teams %}
      <option value="{{ t[0] }}">{{ t[1] }}</option>
      {% endfor %}
    </select>
    <button>Add</button>
  </form>

  <h3>Add Score</h3>
  <form action="/add_score" method="POST">
    <input name="score" placeholder="Score" required>
    <select name="team_id">
      {% for t in teams %}
      <option value="{{ t[0] }}">{{ t[1] }}</option>
      {% endfor %}
    </select>
    <button>Add</button>
  </form>
</body>
</html>
